<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta Musical en Pareja</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#fbc2eb,#a18cd1);
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
  background:white;
  border-radius:25px;
  padding:40px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
  font-size:2.5rem;
  color:#333;
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:20px;
}

.question-box{
  min-height:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  border:4px dashed #a18cd1;
  border-radius:20px;
  padding:30px;
  background:#f7f2ff;
  transition:0.3s;
  position:relative;
}

.question-box::before{
  content:"🎡";
  position:absolute;
  top:-20px;
  right:-10px;
  font-size:6rem;
  opacity:0.08;
}

.question{
  font-size:1.7rem;
  color:#444;
  font-weight:bold;
  line-height:1.5;
}

.spinning{
  animation:pulse 0.5s infinite;
  border-color:#ff5fa2;
  background:#fff0f7;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}

button{
  margin-top:25px;
  padding:15px 35px;
  border:none;
  border-radius:15px;
  background:linear-gradient(90deg,#ff5fa2,#8b5cf6);
  color:white;
  font-size:1.1rem;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

.category{
  margin-bottom:15px;
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  color:white;
  font-weight:bold;
  font-size:0.95rem;
  transition:background 0.4s;
}
</style>
</head>

<body>

<div class="container">

  <h1>🎵 Ruleta de Preguntas</h1>
  <p class="subtitle">Construyan una playlist con su historia</p>

  <div class="category" id="category" style="background:#a18cd1;">🎲 Inicio</div>

  <div class="question-box" id="box">
    <div class="question" id="question">
      Presiona el botón para empezar
    </div>
  </div>

  <button id="btn">🎲 Girar Ruleta</button>

</div>

<script>

const questions = [
  { text: "¿Cuál es la canción perfecta para cantar a gritos en el carro?",                                             category: "🚗 Aventura",   color: "#f97316" },
  { text: "¿Qué tema te recuerda a nuestro primer viaje juntos?",                                                        category: "🗺️ Aventura",   color: "#f97316" },
  { text: "¿Qué canción hace que automáticamente quieran bajar las ventanas y subir el volumen?",                        category: "🚗 Aventura",   color: "#f97316" },
  { text: "¿Qué canción pondrías en un viaje sin destino fijo?",                                                         category: "🗺️ Aventura",   color: "#f97316" },
  { text: "¿Qué tema suena a "aventura juntos"?",                                                                        category: "🗺️ Aventura",   color: "#f97316" },
  { text: "Si nuestra relación fuera una película, ¿cuál sería su tema principal?",                                      category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Cuál crees que es \"nuestra\" canción, esa que siempre que suena nos hace buscarnos con la mirada?",         category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué tema te recuerda a esa etapa donde recién nos estábamos conociendo?",                                    category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué canción describe mejor cómo me ves?",                                                                   category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué canción te hace pensar en un abrazo mío?",                                                               category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué canción te recuerda un momento pequeño pero importante de nosotros?",                                    category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué canción elegirías para bailar lento conmigo aunque no hubiera música alrededor?",                        category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Cuál es esa canción \"culposa\" o vergonzosa que amas bailar?",                                              category: "🎉 Caos",       color: "#ec4899" },
  { text: "Si tuvieras que entrar a una fiesta como estrella de rock, ¿qué canción elegirías?",                          category: "🎉 Caos",       color: "#ec4899" },
  { text: "¿Qué canción te pone de buenas inmediatamente?",                                                              category: "🎉 Caos",       color: "#ec4899" },
  { text: "¿Qué tema nos representa cuando estamos haciendo tonterías juntos?",                                          category: "🎉 Caos",       color: "#ec4899" },
  { text: "¿Qué canción siempre termina convirtiéndose en karaoke?",                                                     category: "🎉 Caos",       color: "#ec4899" },
  { text: "¿Qué canción pondrías para describir nuestro lado más caótico?",                                              category: "🎉 Caos",       color: "#ec4899" },
  { text: "¿Qué canción jamás admitirías públicamente que te encanta?",                                                  category: "🎉 Caos",       color: "#ec4899" },
  { text: "¿Qué artista o género musical te relaja después de un día pesado?",                                           category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué canción elegirías para cocinar juntos?",                                                                 category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué tema pondrías para una noche tranquila hablando hasta tarde?",                                           category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué canción te transmite paz inmediata?",                                                                    category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué canción pondrías un domingo de lluvia juntos?",                                                          category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué canción se siente como \"hogar\"?",                                                                      category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué tema te gustaría escuchar acostados sin hacer nada?",                                                    category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué canción pondrías en un montaje de nuestra vida futura?",                                                 category: "🔮 Futuro",     color: "#10b981" },
  { text: "¿Qué tema suena a "envejecer juntos"?",                                                                      category: "🔮 Futuro",     color: "#10b981" },
  { text: "¿Qué canción imaginas escuchando en un viaje importante dentro de muchos años?",                              category: "🔮 Futuro",     color: "#10b981" },
  { text: "¿Qué canción representa algo que todavía quieres vivir conmigo?",                                             category: "🔮 Futuro",     color: "#10b981" },
  { text: "¿Qué canción guardarías para recordarnos incluso dentro de décadas?",                                         category: "🔮 Futuro",     color: "#10b981" },
  { text: "¿Qué canción define perfectamente mi personalidad?",                                                          category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué tema jamás te cansarías de escuchar conmigo?",                                                           category: "💜 Nosotros",   color: "#8b5cf6" },
  { text: "¿Qué canción sería nuestra despedida perfecta al final de una noche?",                                        category: "🌙 Calma",      color: "#0ea5e9" },
  { text: "¿Qué canción resume mejor todo lo que somos?",                                                                category: "💜 Nosotros",   color: "#8b5cf6" },
];

let availableQuestions = [...questions];

const questionEl = document.getElementById("question");
const categoryEl = document.getElementById("category");
const btn        = document.getElementById("btn");
const box        = document.getElementById("box"); // ✅ id correcto

let spinning = false;

btn.addEventListener("click", () => {

  if (spinning) return;

  spinning = true;
  btn.disabled = true;
  btn.textContent = "Girando...";
  box.classList.add("spinning");

  let i = 0;

  const interval = setInterval(() => {

    const tempIndex = Math.floor(Math.random() * availableQuestions.length);
    questionEl.textContent = availableQuestions[tempIndex].text;

    i++;

    if (i > 20) {

      clearInterval(interval);

      // Selección final sin repetición
      const finalIndex = Math.floor(Math.random() * availableQuestions.length);
      const finalItem  = availableQuestions[finalIndex];

      questionEl.textContent    = finalItem.text;
      categoryEl.textContent    = finalItem.category;
      categoryEl.style.background = finalItem.color;

      // Eliminar pregunta usada
      availableQuestions.splice(finalIndex, 1);

      // Si se acaban, reiniciar
      if (availableQuestions.length === 0) {
        availableQuestions = [...questions];
      }

      spinning = false;
      btn.disabled = false;
      btn.textContent = "🎲 Girar Ruleta";
      box.classList.remove("spinning");
    }

  }, 100);

});

</script>

</body>
</html>
