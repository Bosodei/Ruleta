<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ruleta Musical en Pareja</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#fbc2eb,#a18cd1);
      padding:20px;
    }

    .container{
      width:100%;
      max-width:850px;
      background:white;
      border-radius:25px;
      padding:40px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      font-size:2.5rem;
      color:#333;
      margin-bottom:10px;
    }

    .subtitle{
      color:#666;
      margin-bottom:30px;
    }

    .category{
      display:inline-block;
      margin-bottom:15px;
      padding:10px 18px;
      border-radius:999px;
      color:white;
      font-weight:bold;
      font-size:1rem;
    }

    .question-box{
      position:relative;
      overflow:hidden;
      min-height:240px;
      display:flex;
      justify-content:center;
      align-items:center;
      border:4px dashed #a18cd1;
      border-radius:20px;
      padding:35px;
      background:#f7f2ff;
      transition:0.3s;
    }

    .question-box::before{
      content:"🎡";
      position:absolute;
      top:-25px;
      right:-15px;
      font-size:6rem;
      opacity:0.08;
    }

    .question{
      font-size:1.9rem;
      color:#444;
      line-height:1.5;
      font-weight:bold;
      z-index:2;
    }

    .spinning{
      animation:pulse 0.5s infinite;
      border-color:#ff5fa2;
      background:#fff0f7;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.02);}
      100%{transform:scale(1);}
    }

    button{
      margin-top:30px;
      padding:16px 38px;
      border:none;
      border-radius:15px;
      background:linear-gradient(90deg,#ff5fa2,#8b5cf6);
      color:white;
      font-size:1.15rem;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    button:disabled{
      opacity:0.6;
      cursor:not-allowed;
      transform:scale(1);
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .counter{
      margin-top:20px;
      color:#666;
      font-size:1rem;
    }

    .history{
      margin-top:30px;
      text-align:left;
      background:#faf7ff;
      border-radius:15px;
      padding:20px;
      max-height:250px;
      overflow-y:auto;
    }

    .history h3{
      margin-bottom:10px;
      color:#444;
    }

    .history li{
      margin-bottom:10px;
      color:#555;
      line-height:1.4;
    }

    .footer{
      margin-top:25px;
      color:#777;
      font-size:0.95rem;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🎵 Ruleta de Preguntas</h1>

    <p class="subtitle">
      Construyan juntos una playlist significativa
    </p>

    <div class="category" id="categoryTag">
      🎲 Aleatorio
    </div>

    <div class="question-box" id="questionBox">

      <div class="question" id="questionText">
        Presiona el botón para comenzar
      </div>

    </div>

    <div class="controls">

      <button id="spinButton">
        🎲 Girar Ruleta
      </button>

      <button id="copyButton">
        📋 Copiar Pregunta
      </button>

    </div>

    <div class="counter" id="counter">
      Preguntas respondidas: 0
    </div>

    <div class="history">

      <h3>📝 Historial</h3>

      <ul id="historyList"></ul>

    </div>

    <div class="footer">
      Respondan la pregunta y agreguen una canción a la playlist.
    </div>

  </div>

  <script>

    const questions = [

      {
        category:"🚗 Viajes",
        color:"#ff7b54",
        text:"¿Cuál es la canción perfecta para cantar a gritos en el carro?"
      },

      {
        category:"🚗 Viajes",
        color:"#ff7b54",
        text:"¿Qué tema nos recuerda a nuestro primer viaje juntos?"
      },

      {
        category:"🚗 Viajes",
        color:"#ff7b54",
        text:"Nombra 3 canciones que no pueden faltar para un atardecer en la carretera."
      },

      {
        category:"❤️ Románticas",
        color:"#ff4d6d",
        text:"Si nuestra relación fuera una película, ¿cuál sería su tema principal?"
      },

      {
        category:"❤️ Románticas",
        color:"#ff4d6d",
        text:"¿Qué canción estaba sonando cuando nos dimos nuestro primer beso?"
      },

      {
        category:"❤️ Románticas",
        color:"#ff4d6d",
        text:"¿Cuál es nuestra canción, esa que siempre que suena nos hace buscarnos con la mirada?"
      },

      {
        category:"⚡ Diversión",
        color:"#8338ec",
        text:"¿Cuál es esa canción culposa o vergonzosa que amas bailar?"
      },

      {
        category:"⚡ Diversión",
        color:"#8338ec",
        text:"¿Qué canción siempre termina convirtiéndose en karaoke?"
      },

      {
        category:"⚡ Diversión",
        color:"#8338ec",
        text:"¿Qué canción te pone de buenas inmediatamente?"
      },

      {
        category:"🌙 Relax",
        color:"#3a86ff",
        text:"¿Qué canción elegiríamos para cocinar juntos y tomar vino?"
      },

      {
        category:"🌙 Relax",
        color:"#3a86ff",
        text:"¿Qué canción se siente como hogar?"
      },

      {
        category:"🌙 Relax",
        color:"#3a86ff",
        text:"¿Qué tema te gustaría escuchar acostados sin hacer nada?"
      },

      {
        category:"🌌 Futuro",
        color:"#5f0f40",
        text:"¿Qué tema suena a envejecer juntos?"
      },

      {
        category:"🌌 Futuro",
        color:"#5f0f40",
        text:"¿Qué canción representa algo que todavía quieres vivir conmigo?"
      },

      {
        category:"🌌 Futuro",
        color:"#5f0f40",
        text:"¿Qué canción resume mejor todo lo que somos?"
      }

    ];

    const spinButton = document.getElementById("spinButton");
    const copyButton = document.getElementById("copyButton");

    const questionText = document.getElementById("questionText");
    const questionBox = document.getElementById("questionBox");
    const categoryTag = document.getElementById("categoryTag");

    const counter = document.getElementById("counter");
    const historyList = document.getElementById("historyList");

    let spinning = false;
    let lastQuestion = "";
    let answered = 0;

    spinButton.addEventListener("click", () => {

      if(spinning) return;

      spinning = true;

      questionBox.classList.add("spinning");

      spinButton.disabled = true;

      spinButton.textContent = "Girando...";

      let count = 0;

      const interval = setInterval(() => {

        const randomIndex = Math.floor(Math.random() * questions.length);

        const current = questions[randomIndex];

        questionText.textContent = current.text;

        categoryTag.textContent = current.category;

        categoryTag.style.background = current.color;

        count++;

        if(count > 20){

          clearInterval(interval);

          let finalQuestion;

          do{

            const finalIndex = Math.floor(Math.random() * questions.length);

            finalQuestion = questions[finalIndex];

          } while(finalQuestion.text === lastQuestion);

          questionText.textContent = finalQuestion.text;

          categoryTag.textContent = finalQuestion.category;

          categoryTag.style.background = finalQuestion.color;

          lastQuestion = finalQuestion.text;

          answered++;

          counter.textContent =
            "Preguntas respondidas: " + answered;

          const li = document.createElement("li");

          li.innerHTML =
            "<strong>" +
            finalQuestion.category +
            "</strong> — " +
            finalQuestion.text;

          historyList.prepend(li);

          spinning = false;

          questionBox.classList.remove("spinning");

          spinButton.disabled = false;

          spinButton.textContent = "🎲 Girar Ruleta";

        }

      },100);

    });

    copyButton.addEventListener("click", () => {

      navigator.clipboard.writeText(questionText.textContent);

      copyButton.textContent = "✅ Copiado";

      setTimeout(() => {

        copyButton.textContent = "📋 Copiar Pregunta";

      },1500);

    });

  </script>

</body>
</html>
